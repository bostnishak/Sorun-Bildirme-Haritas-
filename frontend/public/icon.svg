<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ea3ed" />
      <stop offset="100%" stop-color="#1e73be" />
    </linearGradient>
  </defs>
  <!-- Base Plate -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Outer Pulse Ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="#93c5fd" stroke-width="14" stroke-opacity="0.35" stroke-dasharray="24 16" />

  <!-- Middle Radar Ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-width="16" stroke-opacity="0.75" />

  <!-- Inner Signal Ring -->
  <circle cx="256" cy="256" r="70" fill="none" stroke="#bfdbfe" stroke-width="12" stroke-opacity="0.9" />

  <!-- Radar Sweep Crosshairs -->
  <line x1="256" y1="96" x2="256" y2="160" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.8" />
  <line x1="256" y1="352" x2="256" y2="416" stroke="#ffffff" strokeWidth="10" stroke-linecap="round" stroke-opacity="0.8" />
  <line x1="96" y1="256" x2="160" y2="256" stroke="#ffffff" strokeWidth="10" stroke-linecap="round" stroke-opacity="0.8" />
  <line x1="352" y1="256" x2="416" y2="256" stroke="#ffffff" strokeWidth="10" stroke-linecap="round" stroke-opacity="0.8" />

  <!-- Glowing Core Pin -->
  <circle cx="256" cy="256" r="32" fill="#ffffff" />
  <circle cx="256" cy="256" r="14" fill="#1e73be" />
</svg>
