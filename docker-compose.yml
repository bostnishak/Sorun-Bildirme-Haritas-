version: "3.9"

networks:
  chaosmap-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:

services:

  # ─── DATABASE ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: chaosmap-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: chaosmap
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chaosmap-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d chaosmap" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── CACHE (With Vector Search) ─────────────────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: chaosmap-redis
    restart: unless-stopped
    # redis-stack-server passes requirepass differently, but command works for redis-server
    # For redis-stack, it's better to use REDIS_ARGS environment variable or pass command
    environment:
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD} --appendonly yes"
    volumes:
      - redis-data:/data
    networks:
      - chaosmap-net
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── OBJECT STORAGE ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest # Sabit versiyon — latest kullanılmıyor
    container_name: chaosmap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    networks:
      - chaosmap-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── BACKEND API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: chaosmap-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chaosmap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      LOKI_HOST: http://loki:3100
      GOOGLE_VISION_CREDENTIALS_JSON: ${GOOGLE_VISION_CREDENTIALS_JSON}
      NVI_ENDPOINT: ${NVI_ENDPOINT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TC_KIMLIK_PEPPER: ${TC_KIMLIK_PEPPER}
      APP_URL: ${APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - chaosmap-net

  # ─── BACKGROUND WORKER ─────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: production
    container_name: chaosmap-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chaosmap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318/v1/traces
      LOKI_HOST: http://loki:3100
      GOOGLE_VISION_CREDENTIALS_JSON: ${GOOGLE_VISION_CREDENTIALS_JSON}
      NVI_ENDPOINT: ${NVI_ENDPOINT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      TC_KIMLIK_PEPPER: ${TC_KIMLIK_PEPPER}
      APP_URL: ${APP_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      - backend
      - postgres
      - redis
      - minio
    networks:
      - chaosmap-net

  # ─── FRONTEND ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: production
    container_name: chaosmap-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    depends_on:
      - backend
    networks:
      - chaosmap-net

  # ─── REVERSE PROXY ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: chaosmap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - chaosmap-net

  # ─── DATABASE BACKUP (DR) ──────────────────────────────────────────────────
  pg_backup:
    image: postgres:16-alpine
    container_name: chaosmap-pg-backup
    restart: unless-stopped
    volumes:
      - ./backend/backups:/backups
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USER}
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: chaosmap
    # Her gece 03:00'te yedek alır
    command: >
      sh -c '
      apk add --no-cache tzdata &&
      cp /usr/share/zoneinfo/Europe/Istanbul /etc/localtime &&
      echo "0 3 * * * pg_dump -Fc -f /backups/dump_\$$(date +\%Y\%m\%d_\%H\%M\%S).dump && find /backups -type f -name \"*.dump\" -mtime +7 -delete" > /etc/crontabs/root &&
      crond -f -d 8'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chaosmap-net

  # ─── OBSERVABILITY (Prometheus & Grafana) ──────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: chaosmap-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - chaosmap-net

  grafana:
    image: grafana/grafana:11.1.0
    container_name: chaosmap-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    networks:
      - chaosmap-net

  tempo:
    image: grafana/tempo:latest
    container_name: chaosmap-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    ports:
      - "4318:4318"  # OTLP HTTP
    networks:
      - chaosmap-net

  loki:
    image: grafana/loki:latest
    container_name: chaosmap-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - chaosmap-net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: chaosmap-alertmanager
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
    networks:
      - chaosmap-net
