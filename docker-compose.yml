version: "3.9"

networks:
  chaosmap-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:

  # ─── DATABASE ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: chaosmap-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: chaosmap
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - chaosmap-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d chaosmap"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── CACHE ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: chaosmap-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - chaosmap-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── OBJECT STORAGE ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest  # Sabit versiyon — latest kullanılmıyor
    container_name: chaosmap-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    networks:
      - chaosmap-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── BACKEND API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: production
    container_name: chaosmap-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chaosmap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES: ${JWT_ACCESS_EXPIRES}
      JWT_REFRESH_EXPIRES: ${JWT_REFRESH_EXPIRES}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_VISION_CREDENTIALS_JSON: ${GOOGLE_VISION_CREDENTIALS_JSON}
      NVI_ENDPOINT: ${NVI_ENDPOINT}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      TC_KIMLIK_PEPPER: ${TC_KIMLIK_PEPPER}
      APP_URL: ${APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - chaosmap-net

  # ─── BACKGROUND WORKER ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.worker
      target: production
    container_name: chaosmap-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/chaosmap
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_VISION_CREDENTIALS_JSON: ${GOOGLE_VISION_CREDENTIALS_JSON}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
      TC_KIMLIK_PEPPER: ${TC_KIMLIK_PEPPER}
      APP_URL: ${APP_URL}
    depends_on:
      - backend
      - postgres
      - redis
      - minio
    networks:
      - chaosmap-net

  # ─── FRONTEND ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      target: production
    container_name: chaosmap-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    depends_on:
      - backend
    networks:
      - chaosmap-net

  # ─── REVERSE PROXY ─────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: chaosmap-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - chaosmap-net
