version: "3.9"

networks:
  chaosmap-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:

services:
  # ─── DATABASE ──────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: chaosmap-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: chaosmap
      POSTGRES_USER: ${DB_USER:-chaosmap_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_this_strong_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - chaosmap-net

  # ─── CACHE ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: chaosmap-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_this_redis_password} --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - chaosmap-net

  # ─── OBJECT STORAGE ──────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: chaosmap-minio-dev
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-change_this_minio_password}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # MinIO Console
    networks:
      - chaosmap-net
