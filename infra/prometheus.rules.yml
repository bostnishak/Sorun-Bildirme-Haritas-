groups:
  - name: Etiya-Project-AI-Alerts
    rules:
      - alert: HighAIErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected in ChaosMap Backend"
          description: "More than 5% of HTTP requests returned 5xx errors in the last 5 minutes."

      - alert: HighAILatency
        expr: histogram_quantile(0.95, sum(rate(ai_moderation_duration_seconds_bucket[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High AI Processing Latency"
          description: "95th percentile of AI requests are taking longer than 2 seconds."
