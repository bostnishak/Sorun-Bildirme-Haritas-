worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 2048;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml application/json application/javascript
             application/rss+xml application/atom+xml image/svg+xml;

  # Security
  server_tokens off;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=chatbot_limit:10m rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

  # Upstreams
  upstream backend {
    server backend:3001;
    keepalive 32;
  }

  upstream frontend {
    server frontend:3000;
    keepalive 16;
  }

  # HTTP Server (localhost geliştirme)
  server {
    listen 80;
    server_name _;

    limit_conn conn_limit 20;

    # Security Headers (Globally Applied)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=()" always;
    # (CSP can be strict based on next.js requirements, simplified here)
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval';" always;

    # ─── AUTH ─────────────────────────────────────────────────────────────────
    location /api/v1/auth/ {
      limit_req zone=api_limit  burst=10 nodelay;
      limit_req zone=auth_limit burst=3  nodelay;
      client_max_body_size 1m;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 30s;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;
    }

    # ─── CHATBOT API ──────────────────────────────────────────────────────────
    location /api/v1/issues/chatbot {
      limit_req zone=chatbot_limit burst=5 nodelay;
      client_max_body_size 5m;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 30s;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    # ─── API (genel) ──────────────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=50 nodelay;
      client_max_body_size 10m;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 30s;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    # ─── MINIO (Proxy) ────────────────────────────────────────────────────────
    location /minio/ {
      proxy_pass http://minio:9000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── WEBSOCKETS (Backend) ─────────────────────────────────────────────────
    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── FRONTEND ─────────────────────────────────────────────────────────────
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }

    # ─── METRICS (Protected) ──────────────────────────────────────────────────
    location /metrics {
      # Only allow internal Docker network IPs (assuming 172.x.x.x)
      allow 172.16.0.0/12;
      allow 127.0.0.1;
      deny all;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # ─── STATIC ASSETS ────────────────────────────────────────────────────────
    location /_next/static/ {
      proxy_pass http://frontend;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ─── HEALTH CHECK ─────────────────────────────────────────────────────────
    location /health {
      access_log off;
      return 200 "OK\n";
      add_header Content-Type text/plain;
    }
  }

  # ─── PRODUCTION HTTPS TEMPLATE (DRAFT) ─────────────────────────────────────
  # server {
  #   listen 443 ssl http2;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
  #   ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
  #   ssl_protocols TLSv1.2 TLSv1.3;
  #   ssl_prefer_server_ciphers on;
  #   ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
  #
  #   # HSTS
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #
  #   # Geri kalan tüm ayarlar yukarıdaki HTTP server bloğu ile aynı olabilir.
  # }
}
