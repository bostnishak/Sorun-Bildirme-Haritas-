name: Etiya Project Continuous Integration (CI)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  validate-and-build:
    name: Build & Verify Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js (v22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: |
            backend/node_modules
            frontend/node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # ── Backend CI ──────────────────────────────────────────────────────────
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate

      - name: Build Backend (TypeScript Compiler)
        working-directory: ./backend
        run: npm run build

      # ── Frontend CI ─────────────────────────────────────────────────────────
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build Next.js Production Bundle
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5001/api/v1
          NEXT_PUBLIC_MAPBOX_TOKEN: dummy_token_for_build
        run: npm run build

  docker-build-test:
    name: Verify Docker Container Build
    runs-on: ubuntu-latest
    needs: validate-and-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: etiya-project-backend:ci-test

      - name: Test Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: etiya-project-frontend:ci-test
